# Use this file when connecting to an external PostgreSQL instance.
# Set DATABASE_URL in .env to point to your external database.
#
# Usage: docker compose -f docker-compose.external-db.yml up -d

services:
  app:
    image: ${APP_IMAGE:-strategypmo:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: "3000"
      NODE_ENV: production
      ISSUER_URL: ${ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-}
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${AI_INTEGRATIONS_ANTHROPIC_BASE_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      APP_URL: ${APP_URL:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      BASE_PATH: ${BASE_PATH:-/strategy-pmo/}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FORCE_RESEED: ${FORCE_RESEED:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge
