services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: strategypmo
      POSTGRES_USER: spmo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spmo -d strategypmo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── StrategyPMO Application ──
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://spmo:${DB_PASSWORD:-changeme_in_production}@db:5432/strategypmo
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
