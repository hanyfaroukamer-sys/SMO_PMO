openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Initiative Tracker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Initiatives
    description: Initiative CRUD and management.
  - name: Milestones
    description: Milestone CRUD and approval workflow.
  - name: Users
    description: User management (admin only).
  - name: SpmoHierarchy
    description: StrategyPMO programme hierarchy — Pillars, Initiatives, Projects, Milestones.
  - name: SpmoApprovals
    description: StrategyPMO evidence and approval workflow.
  - name: SpmoKPIs
    description: StrategyPMO KPI tracking (strategic and operational).
  - name: SpmoRisks
    description: StrategyPMO risk register and mitigations.
  - name: SpmoAlerts
    description: StrategyPMO dynamic alerts engine.
  - name: SpmoAI
    description: StrategyPMO AI-powered assessment and evidence validation.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /initiatives:
    get:
      tags: [Initiatives]
      operationId: listInitiatives
      summary: List all initiatives
      responses:
        '200':
          description: List of initiatives with progress.
          content:
            application/json:
              schema:
                type: object
                required: [initiatives]
                properties:
                  initiatives:
                    type: array
                    items:
                      $ref: '#/components/schemas/InitiativeWithProgress'
    post:
      tags: [Initiatives]
      operationId: createInitiative
      summary: Create a new initiative (project-manager or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInitiativeRequest'
      responses:
        '201':
          description: Initiative created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Initiative'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /initiatives/{id}:
    get:
      tags: [Initiatives]
      operationId: getInitiative
      summary: Get a single initiative with milestones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Initiative detail with milestones.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiativeDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [Initiatives]
      operationId: updateInitiative
      summary: Update an initiative (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInitiativeRequest'
      responses:
        '200':
          description: Initiative updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Initiative'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Initiatives]
      operationId: deleteInitiative
      summary: Delete an initiative (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /initiatives/{id}/milestones:
    get:
      tags: [Milestones]
      operationId: listMilestones
      summary: List milestones for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of milestones.
          content:
            application/json:
              schema:
                type: object
                required: [milestones]
                properties:
                  milestones:
                    type: array
                    items:
                      $ref: '#/components/schemas/MilestoneWithAttachments'
    post:
      tags: [Milestones]
      operationId: createMilestone
      summary: Create a milestone (project-manager or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMilestoneRequest'
      responses:
        '201':
          description: Milestone created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}:
    put:
      tags: [Milestones]
      operationId: updateMilestone
      summary: Update a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMilestoneRequest'
      responses:
        '200':
          description: Milestone updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Milestones]
      operationId: deleteMilestone
      summary: Delete a milestone (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/submit:
    post:
      tags: [Milestones]
      operationId: submitMilestone
      summary: Submit a milestone for approval (initiative owner / project-manager)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Milestone submitted for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/approve:
    post:
      tags: [Milestones]
      operationId: approveMilestone
      summary: Approve a milestone (approver or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Milestone approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/reject:
    post:
      tags: [Milestones]
      operationId: rejectMilestone
      summary: Reject a milestone (approver or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Milestone rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/attachments:
    post:
      tags: [Milestones]
      operationId: addAttachment
      summary: Add a file attachment to a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAttachmentRequest'
      responses:
        '201':
          description: Attachment added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAttachment'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List all users (admin only)
      responses:
        '200':
          description: List of users with roles.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserWithRole'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/{id}/role:
    put:
      tags: [Users]
      operationId: updateUserRole
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRole'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ======================================================
  # StrategyPMO Endpoints
  # ======================================================

  /spmo/programme:
    get:
      tags: [SpmoHierarchy]
      operationId: getSpmoOverview
      summary: Get the programme overview with computed progress cascade
      responses:
        '200':
          description: Full programme state with pillar breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoProgrammeOverview'

  /spmo/pillars:
    get:
      tags: [SpmoHierarchy]
      operationId: listSpmoPillars
      summary: List all pillars with computed progress
      responses:
        '200':
          description: List of pillars.
          content:
            application/json:
              schema:
                type: object
                required: [pillars]
                properties:
                  pillars:
                    type: array
                    items:
                      $ref: '#/components/schemas/SpmoPillarWithProgress'
    post:
      tags: [SpmoHierarchy]
      operationId: createSpmoPillar
      summary: Create a pillar (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpmoPillarRequest'
      responses:
        '201':
          description: Pillar created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoPillar'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /spmo/pillars/{id}:
    get:
      tags: [SpmoHierarchy]
      operationId: getSpmoPillar
      summary: Get a pillar with its initiatives and projects
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pillar detail with nested hierarchy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoPillarDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [SpmoHierarchy]
      operationId: updateSpmoPillar
      summary: Update a pillar (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpmoPillarRequest'
      responses:
        '200':
          description: Pillar updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoPillar'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [SpmoHierarchy]
      operationId: deleteSpmoPillar
      summary: Delete a pillar (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /spmo/initiatives:
    get:
      tags: [SpmoHierarchy]
      operationId: listSpmoInitiatives
      summary: List all initiatives with computed progress
      parameters:
        - name: pillarId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of initiatives with progress.
          content:
            application/json:
              schema:
                type: object
                required: [initiatives]
                properties:
                  initiatives:
                    type: array
                    items:
                      $ref: '#/components/schemas/SpmoInitiativeWithProgress'
    post:
      tags: [SpmoHierarchy]
      operationId: createSpmoInitiative
      summary: Create an initiative (admin or project-manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpmoInitiativeRequest'
      responses:
        '201':
          description: Initiative created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoInitiative'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /spmo/initiatives/{id}:
    get:
      tags: [SpmoHierarchy]
      operationId: getSpmoInitiative
      summary: Get an initiative with its projects
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Initiative detail with projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoInitiativeDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [SpmoHierarchy]
      operationId: updateSpmoInitiative
      summary: Update an initiative (admin or project-manager)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpmoInitiativeRequest'
      responses:
        '200':
          description: Initiative updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoInitiative'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [SpmoHierarchy]
      operationId: deleteSpmoInitiative
      summary: Delete an initiative (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /spmo/projects:
    get:
      tags: [SpmoHierarchy]
      operationId: listSpmoProjects
      summary: List all projects with computed progress
      parameters:
        - name: initiativeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of projects with progress.
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/SpmoProjectWithProgress'
    post:
      tags: [SpmoHierarchy]
      operationId: createSpmoProject
      summary: Create a project (admin or project-manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpmoProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoProject'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /spmo/projects/{id}:
    get:
      tags: [SpmoHierarchy]
      operationId: getSpmoProject
      summary: Get a project with milestones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Project detail with milestones.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpmoProjectDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [SpmoHierarchy]
      operationId: updateSpmoProject
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
