components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    UploadUrlRequest:
      type: object
      required: [name, size, contentType, milestoneId]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
        milestoneId:
          type: integer
          minimum: 1
          description: ID of the milestone this upload will be attached to.

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    Initiative:
      type: object
      required: [id, title, description, ownerId, status, startDate, targetDate, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: [string, 'null']
        ownerId:
          type: string
        ownerName:
          type: [string, 'null']
        status:
          type: string
          enum: [draft, active, completed, on_hold, cancelled]
        priority:
          type: [string, 'null']
          enum: [low, medium, high, critical, null]
        startDate:
          type: [string, 'null']
          format: date
        targetDate:
          type: [string, 'null']
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InitiativeWithProgress:
      allOf:
        - $ref: '#/components/schemas/Initiative'
        - type: object
          required: [progress, milestoneCount, approvedCount, pendingCount]
          properties:
            progress:
              type: number
              minimum: 0
              maximum: 100
            milestoneCount:
              type: integer
            approvedCount:
              type: integer
            pendingCount:
              type: integer

    InitiativeDetail:
      allOf:
        - $ref: '#/components/schemas/InitiativeWithProgress'
        - type: object
