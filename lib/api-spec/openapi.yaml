openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Initiative Tracker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Initiatives
    description: Initiative CRUD and management.
  - name: Milestones
    description: Milestone CRUD and approval workflow.
  - name: Users
    description: User management (admin only).

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /initiatives:
    get:
      tags: [Initiatives]
      operationId: listInitiatives
      summary: List all initiatives
      responses:
        '200':
          description: List of initiatives with progress.
          content:
            application/json:
              schema:
                type: object
                required: [initiatives]
                properties:
                  initiatives:
                    type: array
                    items:
                      $ref: '#/components/schemas/InitiativeWithProgress'
    post:
      tags: [Initiatives]
      operationId: createInitiative
      summary: Create a new initiative (project-manager or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInitiativeRequest'
      responses:
        '201':
          description: Initiative created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Initiative'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /initiatives/{id}:
    get:
      tags: [Initiatives]
      operationId: getInitiative
      summary: Get a single initiative with milestones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Initiative detail with milestones.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiativeDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [Initiatives]
      operationId: updateInitiative
      summary: Update an initiative (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInitiativeRequest'
      responses:
        '200':
          description: Initiative updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Initiative'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Initiatives]
      operationId: deleteInitiative
      summary: Delete an initiative (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /initiatives/{id}/milestones:
    get:
      tags: [Milestones]
      operationId: listMilestones
      summary: List milestones for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of milestones.
          content:
            application/json:
              schema:
                type: object
                required: [milestones]
                properties:
                  milestones:
                    type: array
                    items:
                      $ref: '#/components/schemas/MilestoneWithAttachments'
    post:
      tags: [Milestones]
      operationId: createMilestone
      summary: Create a milestone (project-manager or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMilestoneRequest'
      responses:
        '201':
          description: Milestone created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}:
    put:
      tags: [Milestones]
      operationId: updateMilestone
      summary: Update a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMilestoneRequest'
      responses:
        '200':
          description: Milestone updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Milestones]
      operationId: deleteMilestone
      summary: Delete a milestone (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/submit:
    post:
      tags: [Milestones]
      operationId: submitMilestone
      summary: Submit a milestone for approval (initiative owner / project-manager)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Milestone submitted for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/approve:
    post:
      tags: [Milestones]
      operationId: approveMilestone
      summary: Approve a milestone (approver or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Milestone approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/reject:
    post:
      tags: [Milestones]
      operationId: rejectMilestone
      summary: Reject a milestone (approver or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Milestone rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /milestones/{id}/attachments:
    post:
      tags: [Milestones]
      operationId: addAttachment
      summary: Add a file attachment to a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAttachmentRequest'
      responses:
        '201':
          description: Attachment added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAttachment'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List all users (admin only)
      responses:
        '200':
          description: List of users with roles.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserWithRole'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/{id}/role:
    put:
      tags: [Users]
      operationId: updateUserRole
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRole'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    UploadUrlRequest:
      type: object
      required: [name, size, contentType, milestoneId]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
        milestoneId:
          type: integer
          minimum: 1
          description: ID of the milestone this upload will be attached to.

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    Initiative:
      type: object
      required: [id, title, description, ownerId, status, startDate, targetDate, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: [string, 'null']
        ownerId:
          type: string
        ownerName:
          type: [string, 'null']
        status:
          type: string
          enum: [draft, active, completed, on_hold, cancelled]
        priority:
          type: [string, 'null']
          enum: [low, medium, high, critical, null]
        startDate:
          type: [string, 'null']
          format: date
        targetDate:
          type: [string, 'null']
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InitiativeWithProgress:
      allOf:
        - $ref: '#/components/schemas/Initiative'
        - type: object
          required: [progress, milestoneCount, approvedCount, pendingCount]
          properties:
            progress:
              type: number
              minimum: 0
              maximum: 100
            milestoneCount:
              type: integer
            approvedCount:
              type: integer
            pendingCount:
              type: integer

    InitiativeDetail:
      allOf:
        - $ref: '#/components/schemas/InitiativeWithProgress'
        - type: object
          required: [milestones]
          properties:
            milestones:
              type: array
              items:
                $ref: '#/components/schemas/MilestoneWithAttachments'

    CreateInitiativeRequest:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          enum: [draft, active, completed, on_hold, cancelled]
        priority:
          type: string
          enum: [low, medium, high, critical]
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date

    UpdateInitiativeRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          enum: [draft, active, completed, on_hold, cancelled]
        priority:
          type: string
          enum: [low, medium, high, critical]
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date

    Milestone:
      type: object
      required: [id, initiativeId, title, status, weight, createdAt, updatedAt]
      properties:
        id:
          type: integer
        initiativeId:
          type: integer
        title:
          type: string
        description:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, in_progress, submitted, approved, rejected]
        weight:
          type: number
          minimum: 0
          maximum: 100
        dueDate:
          type: [string, 'null']
          format: date
        approvedById:
          type: [string, 'null']
        approvedByName:
          type: [string, 'null']
        approvedAt:
          type: [string, 'null']
          format: date-time
        rejectionReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MilestoneWithAttachments:
      allOf:
        - $ref: '#/components/schemas/Milestone'
        - type: object
          required: [attachments]
          properties:
            attachments:
              type: array
              items:
                $ref: '#/components/schemas/FileAttachment'

    CreateMilestoneRequest:
      type: object
      required: [title, weight]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        weight:
          type: number
          minimum: 0
          maximum: 100
        dueDate:
          type: string
          format: date

    UpdateMilestoneRequest:
      type: object
      description: >
        Update content fields of a milestone. Status transitions must use dedicated
        endpoints (submit, approve, reject). Setting status via this endpoint is
        not allowed to prevent privilege escalation.
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        weight:
          type: number
          minimum: 0
          maximum: 100
        dueDate:
          type: string
          format: date

    ApprovalRequest:
      type: object
      properties:
        comment:
          type: string

    FileAttachment:
      type: object
      required: [id, milestoneId, fileName, objectPath, uploadedById, createdAt]
      properties:
        id:
          type: integer
        milestoneId:
          type: integer
        fileName:
          type: string
        contentType:
          type: [string, 'null']
        objectPath:
          type: string
        uploadedById:
          type: string
        uploadedByName:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    AddAttachmentRequest:
      type: object
      required: [fileName, objectPath]
      properties:
        fileName:
          type: string
          minLength: 1
        contentType:
          type: string
        objectPath:
          type: string
          minLength: 1

    UserWithRole:
      type: object
      required: [id, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: string
          enum: [admin, project-manager, approver]
        createdAt:
          type: string
          format: date-time

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, project-manager, approver]
