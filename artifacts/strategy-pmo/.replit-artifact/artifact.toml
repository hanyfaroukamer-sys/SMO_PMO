kind = "web"
previewPath = "/strategy-pmo/"
title = "StrategyPMO"
version = "1.0.0"
id = "artifacts/strategy-pmo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/strategy-pmo/" ]
localPort = 22880

[services.development]
run = "pnpm --filter @workspace/strategy-pmo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/strategy-pmo", "run", "build" ]
publicDir = "artifacts/strategy-pmo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22880"
BASE_PATH = "/strategy-pmo/"
